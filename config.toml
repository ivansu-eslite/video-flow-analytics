[tracker]
track_high_thresh = 0.5
track_low_thresh = 0.1
new_track_thresh = 0.6
track_buffer = 30
match_thresh = 0.8
fuse_score = true
gmc_method = "none"

[model]
model_path = "yolo26m.pt"
batch = 8                 # YOLO 單次批次推理的影格數上限

[output]
save_video = false # 設為 true 會儲存影片；設為 false 則只跑推理不存檔

[input]
bucket_dir = "bucket_name" # 本機模擬 GCS bucket 的根目錄
date = 2026-05-01           # 開發時指定的分析日期；正式呼叫端可直接以參數呼叫 analyze_daily
camera_ids = []             # 空 = camera_registry.yaml 內全部攝影機

[zone]
bucket_minutes = 60       # 人流統計的時段粒度（分鐘）
entry_debounce_frames = 1 # 連續幾格都在區域內才算一次進入；1 = 不去抖，調高可濾掉邊界抖動

[report]
period_minutes = 60              # 報表人流彙總的時段粒度（分鐘），需為 zone.bucket_minutes 的倍數
# "entries" 或 "unique_visitors"；unique_visitors 是跨 bucket 加總的近似值，
# 同一人跨相鄰 bucket 停留時會被重複計入，詳見 CLAUDE.md 的 Report 說明
metric = "entries"
# 同一天資料已存在時："overwrite" / "append"（預設）/ "error"
on_duplicate_date = "append"
