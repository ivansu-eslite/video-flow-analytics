[tracker]
track_high_thresh = 0.5
track_low_thresh = 0.1
new_track_thresh = 0.6
track_buffer = 30
match_thresh = 0.8
fuse_score = true
gmc_method = "none"

[model]
model_path = "20260714-153811_yolo26m_baseline.pt"
batch = 8                 # 湊批目標，實際單次推理批次為此值的 2 倍
classes = [2]              # CrowdHuman 類別過濾：0=head, 1=vbody, 2=fbody

[output]
save_video = false # 設為 true 會儲存影片；設為 false 則只跑推理不存檔

[input]
# bucket_dir／outputs 皆為 cwd 相對路徑：一律以
# `uv run --package video_analyze video_analyze` 在 repo 根執行（見 README）。
bucket_dir = "bucket_name1" # 本機模擬 GCS bucket 的根目錄
date = 2026-05-01           # 開發時指定的分析日期；正式呼叫端可直接以參數呼叫 analyze_daily
camera_ids = []             # 空 = camera_registry.yaml 內全部攝影機
